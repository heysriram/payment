name: payments

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: payments-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - name: Lint OpenAPI spec
        run: npx redocly lint openapi.yaml
        continue-on-error: false

  docs-drift:
    name: OpenAPI bundle drift
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Re-bundle OpenAPI spec
        run: |
          mkdir -p docs/api
          npx @redocly/cli bundle openapi.yaml -o /tmp/openapi.bundled.yaml
      - name: Detect drift between source and committed bundle
        run: |
          if ! cmp -s /tmp/openapi.bundled.yaml docs/api/openapi.bundled.yaml; then
            echo '::error::docs/api/openapi.bundled.yaml is out of date. Run `npm run docs:bundle` and commit the result.'
            diff -u docs/api/openapi.bundled.yaml /tmp/openapi.bundled.yaml | head -200 || true
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  test:
    name: Unit + integration tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: payments
          POSTGRES_PASSWORD: payments_dev
          POSTGRES_DB: payments_db
        options: >-
          --health-cmd "pg_isready -U payments"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://payments:payments_dev@localhost:5432/payments_db
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci_jwt_secret_must_be_at_least_32_characters_long_for_zod_to_pass
      ENCRYPTION_KEY: '0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef'
      RAZORPAY_KEY_ID: rzp_test_ci
      RAZORPAY_KEY_SECRET: rzp_test_ci_secret
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npx prisma db seed
      - run: npm test

  schema-guard:
    name: PCI guard — no PAN/CVV columns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block forbidden tokens in schema/migrations
        run: |
          set -e
          # Forbid bare "pan" and "cvv" as column names in Prisma schema and migrations.
          # We allow `pan ` (Indian business PAN) by case-sensitive matching of capitalised contexts.
          if grep -E -n "(?i)\\b(pan_number|primary_account_number|card_number|cvv|cvc|cvv2|pan_token)\\b" prisma/schema.prisma prisma/migrations/**/migration.sql; then
            echo '::error::Forbidden card-data column detected. We must NEVER store PAN/CVV.'
            exit 1
          fi

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: [build, test, schema-guard]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: payment-gateway:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  mutation:
    name: Stryker mutation tests
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: payments
          POSTGRES_PASSWORD: payments_dev
          POSTGRES_DB: payments_db
        options: >-
          --health-cmd "pg_isready -U payments"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://payments:payments_dev@localhost:5432/payments_db
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci_jwt_secret_must_be_at_least_32_characters_long_for_zod_to_pass
      ENCRYPTION_KEY: '0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef'
      RAZORPAY_KEY_ID: rzp_test_ci
      RAZORPAY_KEY_SECRET: rzp_test_ci_secret
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - name: Restore Stryker incremental cache
        uses: actions/cache@v4
        with:
          path: reports/stryker-incremental.json
          key: stryker-${{ runner.os }}-${{ hashFiles('src/services/**/*.ts') }}
          restore-keys: stryker-${{ runner.os }}-
      - run: npm run test:mutation
      - name: Upload mutation HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-report
          path: reports/mutation
          retention-days: 14

  perf-validate:
    name: Perf scripts syntax check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Validate Artillery YAML
        run: npx artillery run --dry-run perf/artillery-checkout.yml || npx artillery validate perf/artillery-checkout.yml
        continue-on-error: false
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6
      - name: Lint k6 script (parse-only)
        run: k6 inspect perf/k6-payments.js

  postman:
    name: Postman smoke (newman)
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: payments
          POSTGRES_PASSWORD: payments_dev
          POSTGRES_DB: payments_db
        options: >-
          --health-cmd "pg_isready -U payments"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://payments:payments_dev@localhost:5432/payments_db
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci_jwt_secret_must_be_at_least_32_characters_long_for_zod_to_pass
      ENCRYPTION_KEY: '0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef'
      RAZORPAY_KEY_ID: rzp_test_ci
      RAZORPAY_KEY_SECRET: rzp_test_ci_secret
      NODE_ENV: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npx prisma db seed
      - run: npm run build
      - name: Start API
        run: |
          npm start &
          npx wait-on http://localhost:3000/api/health -t 30000
      - run: npm run test:postman
      - name: Upload newman report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: newman-report.html
          retention-days: 7
